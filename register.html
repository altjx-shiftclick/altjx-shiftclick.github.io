<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - ShiftClick</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background-color: #1a1a1a;
        color: #fff;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      nav .logo img {
        max-width: 140px;
      }

      nav .links {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      nav .links a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 0.95rem;
      }

      nav .links a:hover {
        color: #fff;
      }

      .page-body {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 3rem 1rem;
      }

      .container {
        max-width: 420px;
        width: 100%;
      }

      .logo-link {
        display: block;
        text-align: center;
        margin-bottom: 2rem;
      }

      .logo-link img {
        max-width: 180px;
      }

      h1 {
        font-size: 1.5rem;
        text-align: center;
        margin-bottom: 1.5rem;
      }

      form {
        width: 100%;
      }

      .form-group {
        margin-bottom: 1.25rem;
        width: 100%;
      }

      .form-group label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.4rem;
        color: rgba(255, 255, 255, 0.8);
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"] {
        width: 100%;
        padding: 0.7rem 0.75rem;
        font-size: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        box-sizing: border-box;
      }

      input[type="text"]::placeholder,
      input[type="email"]::placeholder,
      input[type="tel"]::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="tel"]:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.12);
      }

      .consent-group {
        margin: 1.5rem 0;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 1rem;
      }

      .consent-group label {
        display: grid;
        grid-template-columns: 20px 1fr;
        gap: 0.65rem;
        cursor: pointer;
        font-size: 0.85rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 0;
      }

      .consent-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin: 2px 0 0 0;
        flex-shrink: 0;
        accent-color: #a22c34;
      }

      .consent-group a {
        color: #ccc;
        text-decoration: underline;
      }

      .btn {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        background-color: #a22c34;
        color: #fff;
        cursor: pointer;
        margin-top: 0.5rem;
      }

      .btn:hover {
        background-color: #8b2530;
      }

      footer {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2rem;
        text-align: center;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.5);
      }

      footer .footer-links {
        margin-bottom: 0.75rem;
      }

      footer .footer-links a {
        color: rgba(255, 255, 255, 0.6);
        text-decoration: underline;
        margin: 0 0.75rem;
      }

    </style>
  </head>

  <body>
    <nav>
      <a href="/" class="logo">
        <img src="logo.png" alt="ShiftClick" />
      </a>
      <div class="links">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
        <a href="/register.html">Sign Up</a>
      </div>
    </nav>

    <div class="page-body">
    <div class="container">

      <h1>Sign Up</h1>

      <form id="signup-form" onsubmit="return handleSubmit(event);">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" />
        </div>

        <div class="consent-group">
          <label>
            <input type="checkbox" id="sms-consent" />
            <span>I agree to receive <strong>transactional</strong> SMS messages
            from <strong>ShiftClick</strong>, including one-time authentication
            codes and security alerts. No promotional or marketing messages will
            be sent. Message frequency varies. Message &amp; data rates may
            apply. Reply HELP for assistance. Reply STOP to opt out. View our
            <a href="/sms-terms.html">SMS Terms</a> and
            <a href="/privacy.html">Privacy Policy</a>.</span>
          </label>
        </div>

        <p id="form-error" style="display:none; color:#ff6b6b; font-size:0.85rem; margin:0 0 0.75rem;"></p>

        <button type="submit" class="btn">Sign Up</button>
      </form>

      <div id="confirmation" style="display:none; text-align:center;">
        <p style="font-size:1.1rem; line-height:1.6; color:rgba(255,255,255,0.9);">
          Thank you for signing up! Your consent has been confirmed. You may now
          receive transactional SMS messages from <strong>ShiftClick</strong>.
        </p>
      </div>

      <script>
        function handleSubmit(e) {
          e.preventDefault();
          var error = document.getElementById("form-error");
          if (!document.getElementById("sms-consent").checked) {
            error.textContent = "Please check the SMS consent box to continue.";
            error.style.display = "block";
            return false;
          }
          error.style.display = "none";
          document.getElementById("signup-form").style.display = "none";
          document.getElementById("confirmation").style.display = "block";
          return false;
        }
      </script>

    </div>
    </div>

    <footer>
      <div class="footer-links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/sms-terms.html">SMS Terms</a>
        <a href="/contact.html">Contact</a>
      </div>
      &copy; 2026 ShiftClick. All rights reserved.
    </footer>
  </body>
</html>
